name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. 代码质量检查
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Check formatting
        run: cargo fmt -- --check
      
      - name: Run clippy
        run: cargo clippy -- -D warnings
      
      - name: Run tests
        run: cargo test --all-features
      
      - name: Run doc tests
        run: cargo test --doc

  # 2. 发布前检查清单
  pre-publish-check:
    name: Pre-Publish Checklist
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: ✅ Check Cargo.toml metadata
        run: |
          echo "Checking Cargo.toml metadata..."
          
          # Required fields
          for field in name version description license repository; do
            if ! grep -q "^$field = " Cargo.toml; then
              echo "❌ Missing required field: $field"
              exit 1
            fi
            echo "  ✅ $field present"
          done
          
          # Check version matches tag
          CARGO_VERSION=$(grep "^version = " Cargo.toml | head -1 | cut -d'"' -f2)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: Cargo.toml ($CARGO_VERSION) != Tag ($TAG_VERSION)"
            exit 1
          fi
          echo "  ✅ Version matches tag: $CARGO_VERSION"
      
      - name: ✅ Check LICENSE file
        run: |
          LICENSE_TYPE=$(grep "^license = " Cargo.toml | cut -d'"' -f2)
          echo "Declared license: $LICENSE_TYPE"
          
          if [ ! -f "LICENSE" ] && [ ! -f "LICENSE.txt" ] && [ ! -f "LICENSE-MIT" ] && [ ! -f "LICENSE-APACHE" ]; then
            echo "❌ LICENSE file not found"
            exit 1
          fi
          echo "  ✅ LICENSE file exists"
          
          # Check consistency for MIT license
          if echo "$LICENSE_TYPE" | grep -q "MIT"; then
            if [ -f "LICENSE" ] && grep -q "MIT License" LICENSE; then
              echo "  ✅ LICENSE content matches MIT"
            elif [ -f "LICENSE-MIT" ]; then
              echo "  ✅ LICENSE-MIT exists"
            else
              echo "⚠️  LICENSE file may not match declared MIT license"
            fi
          fi
      
      - name: ✅ Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Uncommitted changes detected:"
            git status --short
            exit 1
          fi
          echo "  ✅ No uncommitted changes"
      
      - name: ✅ Verify package can be built
        run: |
          echo "Running cargo package --allow-dirty..."
          cargo package --allow-dirty --no-verify 2>&1 | head -20
          echo "  ✅ Package structure valid"
      
      - name: ✅ Check for large files
        run: |
          echo "Checking for large files (>10MB)..."
          LARGE_FILES=$(find . -type f -size +10M \
            ! -path './.git/*' \
            ! -path './target/*' \
            2>/dev/null || true)
          
          if [ -n "$LARGE_FILES" ]; then
            echo "⚠️  Large files found:"
            echo "$LARGE_FILES"
            echo "Consider adding them to 'exclude' in Cargo.toml"
          else
            echo "  ✅ No large files found"
          fi
      
      - name: ✅ Check exclude patterns
        run: |
          echo "Checking exclude patterns in Cargo.toml..."
          
          # Common files that should be excluded
          CHECK_PATTERNS="benchmark testdata scripts docs .github benches"
          
          for pattern in $CHECK_PATTERNS; do
            if grep -q "exclude.*=.*\".*$pattern" Cargo.toml || \
               grep -q "exclude.*=.*\[.*\".*$pattern" Cargo.toml; then
              echo "  ✅ $pattern is excluded"
            else
              if [ -d "$pattern" ]; then
                echo "⚠️  $pattern directory exists but not excluded in Cargo.toml"
              fi
            fi
          done

  # 3. 构建二进制文件
  build:
    name: Build Binaries
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../woofind-${{ matrix.target }}.tar.gz woofind
          cd -
      
      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../woofind-${{ matrix.target }}.zip woofind.exe
          cd -
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: woofind-${{ matrix.target }}
          path: |
            woofind-*.tar.gz
            woofind-*.zip

  # 4. 发布到 crates.io
  publish-crate:
    name: Publish to crates.io
    needs: [test, pre-publish-check, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Verify package
        run: cargo package --allow-dirty
      
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # Skip if token is not available (don't fail the workflow)
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "⚠️ CARGO_REGISTRY_TOKEN not configured, skipping publish"
            exit 0
          fi
          cargo publish --allow-dirty

  # 5. 创建 GitHub Release
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: woofind-*
      
      - name: Generate changelog
        id: changelog
        run: |
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo HEAD~10)..HEAD >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}
            
            ## Installation
            ```bash
            cargo install woofind
            ```
            
            Or download the binary for your platform below.
          files: artifacts/**/*.tar.gz,artifacts/**/*.zip
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 6. 检查版本号是否更新
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check version bump
        run: |
          CURRENT_VERSION=$(grep "^version" Cargo.toml | head -1 | cut -d'"' -f2)
          
          git fetch origin main
          MAIN_VERSION=$(git show origin/main:Cargo.toml | grep "^version" | head -1 | cut -d'"' -f2)
          
          echo "Current PR version: $CURRENT_VERSION"
          echo "Main branch version: $MAIN_VERSION"
          
          if [ "$CURRENT_VERSION" = "$MAIN_VERSION" ]; then
            echo "⚠️ Warning: Version not bumped. Consider updating version in Cargo.toml"
          else
            echo "✅ Version bumped from $MAIN_VERSION to $CURRENT_VERSION"
          fi
